<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>夏日室内专属计划</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#1FA07D; --teal-d:#0F6E56; --teal-l:#E1F5EE;
  --coral:#E8714A; --coral-d:#B0461F; --coral-l:#FAECE7;
  --amber:#F4A93B; --amber-d:#8A5A0B; --amber-l:#FBEFD9;
  --indigo:#3A6EA5; --indigo-d:#264a72; --indigo-l:#E7EFF8;
  --ink:#2B2A26; --ink-2:#6B6A63; --ink-3:#A09E94;
  --card:#FFFFFF; --line:#ECE7DC;
  --accent:var(--coral); --accent-d:var(--coral-d); --accent-l:var(--coral-l);
  --radius:20px; --radius-sm:14px;
  --shadow:0 8px 28px rgba(30,50,40,.07), 0 2px 8px rgba(30,50,40,.05);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"Noto Sans SC",-apple-system,system-ui,sans-serif;
  color:var(--ink); line-height:1.7; -webkit-font-smoothing:antialiased;
  background:
    radial-gradient(1100px 460px at 82% -8%, #FDE5D6 0%, rgba(253,229,214,0) 60%),
    radial-gradient(900px 420px at 6% 4%, #DDF1E8 0%, rgba(221,241,232,0) 58%),
    linear-gradient(180deg,#FCF8F0 0%, #F7F4EC 100%);
  background-attachment:fixed; min-height:100vh;
}
body.evening{
  --accent:var(--indigo); --accent-d:var(--indigo-d); --accent-l:var(--indigo-l);
  background:
    radial-gradient(1000px 460px at 84% -6%, #DCE7F4 0%, rgba(220,231,244,0) 60%),
    radial-gradient(900px 420px at 4% 2%, #DCEFE8 0%, rgba(220,239,232,0) 56%),
    linear-gradient(180deg,#F6F6F1 0%, #EEF1F0 100%);
}
.wrap{max-width:920px;margin:0 auto;padding:30px 20px 64px}
/* ---------- hero ---------- */
.hero{text-align:center;padding:14px 8px 22px}
.hero .badge{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);
  color:var(--accent-d);font-size:13px;font-weight:500;padding:6px 14px;border-radius:999px;box-shadow:var(--shadow)}
.hero h1{font-family:"Baloo 2","Noto Sans SC",sans-serif;font-weight:700;letter-spacing:.5px;
  font-size:clamp(30px,6vw,46px);margin:16px 0 6px;line-height:1.15}
.hero .sub{font-size:clamp(15px,2.4vw,18px);color:var(--ink-2);font-weight:500;margin:0 0 16px}
.hero .strat{max-width:640px;margin:0 auto;font-size:14px;color:var(--ink-2);
  background:rgba(255,255,255,.55);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 18px}
.hero .strat b{color:var(--ink)}
/* ---------- controls ---------- */
.controls{position:sticky;top:0;z-index:30;margin:18px 0 8px;padding:12px;
  background:rgba(252,248,240,.82);backdrop-filter:blur(10px);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow)}
body.evening .controls{background:rgba(244,245,242,.85)}
.ctl-row{display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.seg{display:inline-flex;background:#F1EDE3;border-radius:999px;padding:5px;gap:4px}
.seg button{border:0;background:transparent;cursor:pointer;font-family:inherit;font-size:15px;font-weight:500;
  color:var(--ink-2);padding:9px 18px;border-radius:999px;display:inline-flex;align-items:center;gap:8px;transition:.18s;white-space:nowrap}
.seg button .ic{font-size:17px}
.seg button.on{background:var(--card);color:var(--accent-d);box-shadow:0 2px 8px rgba(30,50,40,.12)}
.spring{flex:1 1 auto}
.jump{display:flex;align-items:center;gap:8px;color:var(--ink-2);font-size:13px}
.jump select{font-family:inherit;font-size:14px;color:var(--ink);background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:9px 12px;max-width:230px;cursor:pointer}
.prog{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line)}
.prog .lab{font-size:13px;color:var(--ink-2);white-space:nowrap}
.prog .bar{flex:1 1 120px;height:9px;background:#EDE7DB;border-radius:999px;overflow:hidden;min-width:120px}
.prog .fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--amber));border-radius:999px;transition:width .35s}
.prog .pct{font-size:13px;font-weight:700;color:var(--accent-d);white-space:nowrap}
.btn-mini{border:1px solid var(--line);background:var(--card);color:var(--ink-2);font-family:inherit;font-size:12.5px;
  padding:7px 12px;border-radius:10px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-mini:hover{color:var(--accent-d);border-color:var(--accent)}
/* ---------- group ---------- */
.period{display:none}
.period.show{display:block;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.grp{display:flex;align-items:center;gap:12px;margin:28px 4px 14px}
.grp .n{flex:none;width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;font-weight:700;
  display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 4px 10px rgba(0,0,0,.10)}
.grp h2{font-size:18px;margin:0;font-weight:700}
.grp .t{font-size:12.5px;color:var(--ink-3);margin-left:auto;white-space:nowrap}
/* ---------- card ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
  margin:14px 0;overflow:hidden;transition:.2s}
.card.done{border-color:var(--teal)}
.head{display:grid;grid-template-columns:64px 1fr auto;gap:14px;align-items:center;padding:14px 16px;cursor:pointer}
.thumb{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 38%, #FFF7EA, #F3EAD8)}
body.evening .thumb{background:radial-gradient(circle at 50% 38%, #EEF3FB, #E3EAF3)}
.thumb svg{width:58px;height:48px}
.head .title{min-width:0}
.head .nm{font-size:16.5px;font-weight:700;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.head .en{font-size:11.5px;color:var(--ink-3);font-weight:400}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 9px;border-radius:999px;font-weight:500}
.tag.t-mus{background:var(--coral-l);color:var(--coral-d)}
.tag.t-set{background:var(--teal-l);color:var(--teal-d)}
.tag.t-rest{background:var(--amber-l);color:var(--amber-d)}
.head .right{display:flex;align-items:center;gap:10px}
.chk{position:relative;width:26px;height:26px;flex:none}
.chk input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer}
.chk .box{position:absolute;inset:0;border:2px solid var(--line);border-radius:9px;display:flex;align-items:center;
  justify-content:center;color:#fff;font-size:15px;transition:.15s}
.chk input:checked + .box{background:var(--teal);border-color:var(--teal)}
.chk .box .ic{opacity:0;transform:scale(.5);transition:.15s}
.chk input:checked + .box .ic{opacity:1;transform:scale(1)}
.chev{color:var(--ink-3);font-size:22px;transition:transform .25s;line-height:1}
.card.open .chev{transform:rotate(180deg)}
.body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.card.open .body{max-height:1600px}
.body-in{padding:4px 18px 20px;border-top:1px dashed var(--line)}
.detail{display:grid;grid-template-columns:240px 1fr;gap:22px;margin-top:16px;align-items:start}
.fig{background:radial-gradient(circle at 50% 36%, #FFF7EA, #F1E7D4);border-radius:var(--radius-sm);
  padding:8px;display:flex;align-items:center;justify-content:center}
body.evening .fig{background:radial-gradient(circle at 50% 36%, #EDF3FB, #E1E9F3)}
.fig svg{width:100%;height:auto;display:block}
.steps{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:11px}
.steps li{display:flex;gap:11px;align-items:flex-start}
.steps .sn{flex:none;width:23px;height:23px;border-radius:50%;background:var(--teal-l);color:var(--teal-d);
  font-size:12.5px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:2px}
.steps li p{margin:0;font-size:14.5px}
.steps li b{font-weight:700}
.breath{display:flex;align-items:center;gap:9px;margin-top:14px;font-size:13.5px;color:var(--teal-d);
  background:var(--teal-l);padding:9px 13px;border-radius:11px}
.breath .ic{font-size:17px}
.notes{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.note{border-radius:13px;padding:11px 14px}
.note .h{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;margin-bottom:4px}
.note p{margin:0;font-size:13px;color:var(--ink-2);line-height:1.55}
.note.warn{background:#FCEEE9}.note.warn .h{color:var(--coral-d)}
.note.tip{background:var(--teal-l)}.note.tip .h{color:var(--teal-d)}
.note .ic{font-size:16px}
/* footer */
.foot{text-align:center;color:var(--ink-3);font-size:12.5px;margin-top:40px;line-height:1.8}
.foot .tide{font-size:20px;letter-spacing:6px;opacity:.6}
/* responsive */
@media(max-width:680px){
  .detail{grid-template-columns:1fr;gap:14px}
  .fig{max-width:280px;margin:0 auto}
  .notes{grid-template-columns:1fr}
  .head{grid-template-columns:54px 1fr auto;gap:11px;padding:12px}
  .thumb{width:54px;height:54px}.thumb svg{width:48px;height:40px}
  .jump{width:100%}.jump select{max-width:none;flex:1}
  .seg{flex:1}.seg button{flex:1;justify-content:center;padding:10px 6px;font-size:14px}
  .seg-sub{display:none}
}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <span class="badge"><span id="hero-emoji">🌴</span> 夏日室内维护计划</span>
    <h1>夏日室内专属计划</h1>
    <p class="sub">无深蹲 · 无俯卧撑 · 清爽维护</p>
    <p class="strat"><b>核心策略：</b>规避夏日暴汗与紫外线，总强度精准下调 20–30%；用更温和的方式保护关节、打破神经适应、维持肌肉张力。</p>
  </header>

  <div class="controls">
    <div class="ctl-row">
      <div class="seg" role="tablist">
        <button id="seg-m" class="on" onclick="setPeriod('morning')"><span class="ic">☀️</span>晨间<span class="seg-sub"> · 上肢与核心</span></button>
        <button id="seg-e" onclick="setPeriod('evening')"><span class="ic">🌙</span>晚间<span class="seg-sub"> · 后侧链</span></button>
      </div>
      <span class="spring"></span>
      <label class="jump">🔎 快速跳转
        <select id="jump" onchange="jumpTo(this.value)"></select>
      </label>
    </div>
    <div class="prog">
      <span class="lab" id="prog-lab">今日打卡</span>
      <div class="bar"><div class="fill" id="prog-fill"></div></div>
      <span class="pct" id="prog-pct">0 / 0</span>
      <button class="btn-mini" onclick="toggleAll()" id="btn-all">⊕ 全部展开</button>
      <button class="btn-mini" onclick="resetDay()">↺ 重置打卡</button>
    </div>
  </div>

  <section id="period-morning" class="period show"></section>
  <section id="period-evening" class="period"></section>

  <footer class="foot">
    <div class="tide">～ ～ ～</div>
    清爽维护 · 量力而行 · 关节无不适为度<br>训练数据仅保存在本机浏览器
  </footer>
</div>

/* ============ 渲染 ============ */
var ICON_CHK='<span class="ic">✓</span>';
function dayKey(){var d=new Date();return 'routine_'+d.getFullYear()+(d.getMonth()+1)+d.getDate();}
function getDone(){try{return JSON.parse(localStorage.getItem(dayKey())||'[]');}catch(e){return [];}}
function setDone(a){try{localStorage.setItem(dayKey(),JSON.stringify(a));}catch(e){}}

function card(ex,idx){
  var done=getDone().indexOf(ex.nm)>=0;
  return '<div class="card'+(done?' done':'')+'" id="card-'+idx+'">'+
    '<div class="head" onclick="toggleCard('+idx+',event)">'+
      '<div class="thumb"><svg viewBox="0 0 240 200">'+ex.fig+'</svg></div>'+
      '<div class="title"><div class="nm">'+ex.nm+' <span class="en">'+ex.en+'</span></div>'+
        '<div class="tags"><span class="tag t-mus">🎯 '+ex.mus+'</span>'+
        '<span class="tag t-set">🔁 '+ex.set+'</span>'+
        '<span class="tag t-rest">⏱ '+ex.rest+'</span></div></div>'+
      '<div class="right"><label class="chk" onclick="event.stopPropagation()">'+
        '<input type="checkbox" '+(done?'checked':'')+' onchange="toggleDone(\''+esc(ex.nm)+'\',this.checked)">'+
        '<span class="box">'+ICON_CHK+'</span></label>'+
        '<span class="chev">⌄</span></div>'+
    '</div>'+
    '<div class="body"><div class="body-in"><div class="detail">'+
      '<div class="fig"><svg viewBox="0 0 240 200">'+ex.fig+'</svg></div>'+
      '<div class="info">'+
        '<ol class="steps">'+ex.steps.map(function(s,si){return '<li><span class="sn">'+(si+1)+'</span><p><b>'+s[0]+'：</b>'+s[1]+'</p></li>';}).join('')+'</ol>'+
        '<div class="breath"><span class="ic">🫁</span>呼吸节奏：'+ex.breath+'</div>'+
        '<div class="notes"><div class="note warn"><div class="h"><span class="ic">⚠️</span>常见错误</div><p>'+ex.warn+'</p></div>'+
        '<div class="note tip"><div class="h"><span class="ic">💡</span>小贴士</div><p>'+ex.tip+'</p></div></div>'+
      '</div></div></div></div>'+
  '</div>';
}
function esc(s){return s.replace(/'/g,"\\'");}

function renderPeriod(p){
  var list=EX.filter(function(e){return e.p===p;});
  var html='',lastG=null;
  list.forEach(function(ex){
    var gi=EX.indexOf(ex);
    if(ex.g!==lastG){
      html+='<div class="grp"><div class="n">'+ex.g+'</div><h2>'+groupName(p,ex.g)+'</h2><span class="t">'+ex.gt.split(' · ').slice(1).join(' · ')+'</span></div>';
      lastG=ex.g;
    }
    html+=card(ex,gi);
  });
  document.getElementById('period-'+p).innerHTML=html;
}
function groupName(p,g){
  var m={1:"关节唤醒",2:"核心与上肢维护",3:"平缓收尾"},e={1:"静态激活",2:"背部与下肢后侧链",3:"舒缓拉伸"};
  return (p==='morning'?m:e)[g];
}

/* ============ 交互 ============ */
var curP='morning';
function setPeriod(p){
  curP=p;
  document.getElementById('seg-m').classList.toggle('on',p==='morning');
  document.getElementById('seg-e').classList.toggle('on',p==='evening');
  document.getElementById('period-morning').classList.toggle('show',p==='morning');
  document.getElementById('period-evening').classList.toggle('show',p==='evening');
  document.body.classList.toggle('evening',p==='evening');
  document.getElementById('hero-emoji').textContent=p==='evening'?'🌙':'🌴';
  buildJump();updateProg();openFirst();allOpen=false;syncAllBtn();
}
function buildJump(){
  var sel=document.getElementById('jump');
  var list=EX.map(function(e,i){return {e:e,i:i};}).filter(function(o){return o.e.p===curP;});
  sel.innerHTML='<option value="">— 选择动作 —</option>'+list.map(function(o,k){
    return '<option value="'+o.i+'">'+(k+1)+' · '+o.e.nm+'</option>';}).join('');
}
function jumpTo(i){
  if(i==='')return;
  var c=document.getElementById('card-'+i);
  if(!c)return;
  c.classList.add('open');
  c.scrollIntoView({behavior:'smooth',block:'center'});
  c.animate?c.animate([{boxShadow:'0 0 0 3px var(--accent)'},{boxShadow:'var(--shadow)'}],{duration:1100}):0;
}
function toggleCard(i,e){
  document.getElementById('card-'+i).classList.toggle('open');
}
function toggleDone(nm,on){
  var a=getDone();var k=a.indexOf(nm);
  if(on&&k<0)a.push(nm); if(!on&&k>=0)a.splice(k,1);
  setDone(a);
  // 更新卡片 done 边框
  EX.forEach(function(ex,i){var c=document.getElementById('card-'+i);if(c)c.classList.toggle('done',getDone().indexOf(ex.nm)>=0);});
  updateProg();
}
function updateProg(){
  var list=EX.filter(function(e){return e.p===curP;});
  var done=getDone();
  var n=list.filter(function(e){return done.indexOf(e.nm)>=0;}).length;
  var t=list.length, pct=t?Math.round(n/t*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=n+' / '+t;
  document.getElementById('prog-lab').textContent=(curP==='morning'?'☀️ 晨间打卡':'🌙 晚间打卡');
}
function openFirst(){
  var first=EX.map(function(e,i){return{e:e,i:i};}).filter(function(o){return o.e.p===curP;})[0];
  if(first)document.getElementById('card-'+first.i).classList.add('open');
}
var allOpen=false;
function toggleAll(){
  allOpen=!allOpen;
  EX.forEach(function(e,i){if(e.p===curP){var c=document.getElementById('card-'+i);if(c)c.classList.toggle('open',allOpen);}});
  syncAllBtn();
}
function syncAllBtn(){document.getElementById('btn-all').textContent=allOpen?'⊖ 全部收起':'⊕ 全部展开';}
function resetDay(){
  if(!confirm('确定清空今天的打卡记录吗？'))return;
  setDone([]);
  EX.forEach(function(e,i){var c=document.getElementById('card-'+i);if(c){c.classList.remove('done');var cb=c.querySelector('input');if(cb)cb.checked=false;}});
  updateProg();
}

/* init */
renderPeriod('morning');renderPeriod('evening');
buildJump();updateProg();openFirst();
</script>
